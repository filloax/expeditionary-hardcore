modLoader="kotlinforforge"
loaderVersion="${kotlinforge_version_range}"

license="${license}"
issueTrackerURL="https://github.com/filloax/expeditionary-hardcore/issues"

[[mixins]]
    config="expeditionaryhardcore.mixins.json"

[[mods]]
    modId="${mod_id}"
    version="${version_prefix}-neoforge"
    displayName="${mod_name}"
    displayURL="https://github.com/filloax/expeditionary-hardcore"
    logoFile="${mod_icon}"
    authors="Filloax"
    description='''Expeditionary Hardcore.'''

[[dependencies]]
    modId="neoforge"
    type="required"
    versionRange="${neoforge_version_range}"

[[dependencies]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"

[[dependencies]]
    modId="filloaxlib"
    type="required"
    versionRange="[${filloaxlib_version},)"
