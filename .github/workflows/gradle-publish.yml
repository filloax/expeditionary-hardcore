on:
  workflow_dispatch:
  push:
    branches:
      - 'release/**'

jobs:
  build:
    if: "contains(github.event.head_commit.message, 'chore: release') && github.event_name != 'pull_request'"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.get_version.outputs.modVersion }}
      java_version: ${{ steps.java_version.outputs.javaVersion }}
      mc_version: ${{ steps.mc_version.outputs.value }}

    steps:
    - uses: actions/checkout@v4

    - name: "Read Java version"
      uses: BrycensRanch/read-properties-action@v1.0.4
      id: java_version
      with:
        file: gradle.properties
        property: javaVersion

    - name: "Read MC version"
      uses: SebRollen/toml-action@v1.2.0
      id: mc_version
      with:
        file: 'gradle/libs.versions.toml'
        field: 'versions.minecraft'

    - name: "Read mod version"
      uses: BrycensRanch/read-properties-action@v1.0.4
      id: get_version
      with:
        file: gradle.properties
        property: modVersion

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: ${{ steps.java_version.outputs.javaVersion }}
        distribution: 'temurin'
        settings-path: ${{ github.workspace }}

    - name: Make Gradle Wrapper Executable
      if: ${{ runner.os != 'Windows' }}
      run: chmod +x ./gradlew

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@417ae3ccd767c252f5661f1ace9f835f9654f2b5

    - name: Build with Gradle
      run: ./gradlew build
      env:
        GRADLE_OPTS: "-Djava.net.preferIPv4Stack=true"

    - name: Extract latest changelog
      run: |
        awk '/^## /{if(found)exit; found=1} found{print}' CHANGELOG.md > latest_changelog.txt

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          base/build/libs/*.jar
          fabric/build/libs/*.jar
          neoforge/build/libs/*.jar
          latest_changelog.txt

  release-github:
    name: Release (GitHub)
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts

    - name: Append dependencies to release body
      run: |
        cat >> latest_changelog.txt <<'EOF'

        ## Dependencies

        **All Loaders:**
        - [ResourcefulConfig](https://modrinth.com/mod/resourceful-config)

        **Fabric:**
        - [Fabric API](https://modrinth.com/mod/fabric-api)
        - [Fabric Language Kotlin](https://modrinth.com/mod/fabric-language-kotlin)

        **NeoForge:**
        - [Kotlin for Forge](https://modrinth.com/mod/kotlin-for-forge)

        *Included in current version*
        - [FilloaxLib](https://modrinth.com/mod/filloaxlib)
        - [Apibalego](https://github.com/filloax/apibalego)
        EOF

    - name: Publish (GitHub)
      uses: softprops/action-gh-release@v2
      id: publish_github
      with:
        name: Expeditionary Hardcore ${{ needs.build.outputs.version }} - ${{ needs.build.outputs.mc_version }}
        body_path: latest_changelog.txt
        token: ${{ secrets.GITHUB_TOKEN }}
        make_latest: true
        tag_name: "${{ needs.build.outputs.version }}-${{ needs.build.outputs.mc_version }}"
        target_commitish: ${{ github.sha }}
        files: |
          base/build/libs/*.jar
          fabric/build/libs/*.jar
          neoforge/build/libs/*.jar

    - name: Trigger Jitpack build
      if: steps.publish_github.outcome == 'success'
      run: |
        sleep 10s && curl --max-time 0 -L \
          https://jitpack.io/com/github/filloax/expeditionary-hardcore/expeditionary-hardcore-base/${{ needs.build.outputs.version }}-${{ needs.build.outputs.mc_version }}/expeditionary-hardcore-base-${{ needs.build.outputs.version }}-${{ needs.build.outputs.mc_version }}.pom
